name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 mypy pytest pytest-cov

      - name: Lint with flake8
        run: flake8 src/ tests/ --count --select=E9,F63,F7,F82 --statistics

      - name: Type check with mypy
        run: mypy --config-file=pyproject.toml --disable-error-code no-any-return src/

      - name: Test with pytest
        run: pytest tests/ -v --cov=src --cov-report=term

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install and run pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: probviz:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max